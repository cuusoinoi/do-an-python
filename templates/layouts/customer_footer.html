    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const successMsg = {{ (flash.success or '')|tojson }};
            const errorMsg = {{ (flash.error or '')|tojson }};

            const message = successMsg || errorMsg;
            if (!message) return;

            const toast = document.createElement('div');
            toast.className = successMsg ? 'toast success' : 'toast error';
            toast.style.top = '20px';
            toast.style.right = '20px';
            toast.style.left = 'auto';
            toast.style.bottom = 'auto';
            toast.style.minWidth = '320px';
            toast.style.zIndex = '99999';
            toast.innerHTML = successMsg
                ? `<i class="fas fa-check-circle"></i><span>${message}</span>`
                : `<i class="fas fa-exclamation-circle"></i><span>${message}</span>`;
            document.body.appendChild(toast);

            setTimeout(() => toast.classList.add('show'), 50);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        });
    </script>
