{% extends "_base.html" %}
{% block content %}
<h1>{{ title }}</h1>
<form method="post" action="{% if action == 'add' %}/admin/customers/store{% else %}/admin/customers/update/{{ row.customer_id }}{% endif %}">
    <label>Ho ten</label>
    <input type="text" name="fullname" value="{{ row.customer_name if row else '' }}" required>
    <label>Dien thoai</label>
    <input type="text" name="phone" value="{{ row.customer_phone_number if row else '' }}" required>
    <label>CCCD</label>
    <input type="text" name="identity_card" value="{{ row.customer_identity_card if row else '' }}">
    <label>Dia chi</label>
    <input type="text" name="address" value="{{ row.customer_address if row else '' }}" required>
    <label>Ghi chu</label>
    <textarea name="note">{{ row.customer_note if row else '' }}</textarea>
    <button type="submit">Luu</button>
    <a href="/admin/customers">Quay lai</a>
</form>
{% endblock %}
