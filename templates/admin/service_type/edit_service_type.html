<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="icon" type="image/png" href="/static/admin_assets/images/logo.png">
    <link rel="stylesheet" href="/static/assets/css/base.css">
    <link rel="stylesheet" href="/static/assets/css/main.css">
    <link rel="stylesheet" href="/static/assets/css/grid.css">
    <link rel="stylesheet" href="/static/assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
    <div class="overlay" id="overlay"></div>
    {% include 'layouts/admin_sidebar.html' %}
    <main class="main">
        {% include 'layouts/admin_header.html' %}
        <main class="content">
            <div class="form-container">
                <h2>Chỉnh sửa loại dịch vụ</h2>
                {% if flash.error %}
                    <div class="alert alert-error">{{ flash.error }}</div>
                {% endif %}
                <form action="{{ site_url('admin/service-types/update/' ~ serviceType.service_type_id) }}" method="post">
                    
                    <div class="form-group">
                        <label for="name">Tên dịch vụ <span class="required-field">*</span></label>
                        <input type="text" id="name" name="name" value="{{ serviceType.service_name }}" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Mô tả</label>
                        <textarea id="description" name="description" rows="3">{{ serviceType.description or '' }}</textarea>
                    </div>
                    <div class="form-group">
                        <label for="price">Giá (VNĐ)</label>
                        <input type="number" id="price" name="price" placeholder="Nhập giá dịch vụ" min="0" step="1000" value="{{ serviceType.price or 0 }}">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-save"><i class="fas fa-save"></i> Lưu</button>
                        <a href="/admin/service-types" class="btn btn-cancel">Hủy</a>
                    </div>
                </form>
            </div>
        </main>
        {% include 'layouts/admin_footer.html' %}
    </main>
    <script src="/static/assets/js/script.js" defer></script>
</body>
</html>
