<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="icon" type="image/png" href="/static/admin_assets/images/logo.png">
    <link rel="stylesheet" href="/static/assets/css/base.css">
    <link rel="stylesheet" href="/static/assets/css/main.css">
    <link rel="stylesheet" href="/static/assets/css/grid.css">
    <link rel="stylesheet" href="/static/assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
    <div class="overlay" id="overlay"></div>
    {% include 'layouts/admin_sidebar.html' %}
    <main class="main">
        {% include 'layouts/admin_header.html' %}
        <main class="content">
            <div class="form-container">
                <h2>Chỉnh sửa người dùng</h2>
                {% if flash.error %}
                    <div class="alert alert-error">{{ flash.error }}</div>
                {% endif %}
                <form action="{{ site_url('admin/users/update/' ~ user.id) }}" method="post">
                    
                    <div class="form-group">
                        <label for="username">Tên đăng nhập</label>
                        <input type="text" id="username" name="username" value="{{ user.username }}" readonly>
                    </div>
                    <div class="form-group">
                        <label for="fullname">Họ tên <span class="required-field">*</span></label>
                        <input type="text" id="fullname" name="fullname" value="{{ user.fullname }}" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Mật khẩu mới (để trống nếu không đổi)</label>
                        <input type="password" id="password" name="password" placeholder="Nhập mật khẩu mới">
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Xác nhận mật khẩu mới</label>
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Nhập lại mật khẩu mới">
                    </div>
                    <div class="form-group">
                        <label for="role">Vai trò <span class="required-field">*</span></label>
                        <select id="role" name="role" required>
                            <option value="admin" {{ 'selected' if user.role == 'admin' else '' }}>admin</option>
                            <option value="staff" {{ 'selected' if user.role == 'staff' else '' }}>staff</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-save"><i class="fas fa-save"></i> Lưu</button>
                        <a href="/admin/users" class="btn btn-cancel">Hủy</a>
                    </div>
                </form>
            </div>
        </main>
        {% include 'layouts/admin_footer.html' %}
    </main>
    <script src="/static/assets/js/script.js" defer></script>
</body>
</html>
