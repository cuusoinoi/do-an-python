<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="icon" type="image/png" href="/static/admin_assets/images/logo.png">
    <link rel="stylesheet" href="/static/assets/css/base.css">
    <link rel="stylesheet" href="/static/assets/css/main.css">
    <link rel="stylesheet" href="/static/assets/css/grid.css">
    <link rel="stylesheet" href="/static/assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
    <div class="overlay" id="overlay"></div>
    {% include 'layouts/admin_sidebar.html' %}
    <main class="main">
        {% include 'layouts/admin_header.html' %}
        <main class="content">
            <div class="form-container">
                <h2>Thêm lưu chuồng mới</h2>
                {% if flash.error %}
                    <div class="alert alert-error">{{ flash.error }}</div>
                {% endif %}
                <form action="/admin/pet-enclosures/store" method="post">
                    
                    <div class="form-group">
                        <label for="customer_id">Khách hàng <span class="required-field">*</span></label>
                        <select id="customer_id" name="customer_id" required>
                            <option value="">-- Chọn khách hàng --</option>
                            {% for customer in customers %}
                                <option value="{{ customer.customer_id }}">{{ customer.customer_name }} - {{ customer.customer_phone_number }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pet_id">Thú cưng <span class="required-field">*</span></label>
                        <select id="pet_id" name="pet_id" required>
                            <option value="">-- Chọn thú cưng --</option>
                            {% for pet in pets %}
                                <option value="{{ pet.pet_id }}" data-customer="{{ pet.customer_id }}">{{ pet.pet_name }} - {{ pet.pet_species }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="enclosure_number">Số chuồng <span class="required-field">*</span></label>
                        <input type="number" id="enclosure_number" name="enclosure_number" min="1" step="1" inputmode="numeric" placeholder="VD: 12" required>
                    </div>
                    <div class="form-group">
                        <label for="check_in_date">Ngày check-in <span class="required-field">*</span></label>
                        <input type="datetime-local" id="check_in_date" name="check_in_date" value="{{ date('Y-m-dTH:i') }}" required>
                    </div>
                    <div class="form-group">
                        <label for="daily_rate">Giá/ngày (VNĐ) <span class="required-field">*</span></label>
                        <input type="number" id="daily_rate" name="daily_rate" value="{{ settings.daily_rate or 100000 }}" required>
                    </div>
                    <div class="form-group">
                        <label for="deposit">Đặt cọc (VNĐ)</label>
                        <input type="number" id="deposit" name="deposit" value="0">
                    </div>
                    <div class="form-group">
                        <label for="emergency_limit">Hạn mức cấp cứu (VNĐ)</label>
                        <input type="number" id="emergency_limit" name="emergency_limit" value="0">
                    </div>
                    <div class="form-group">
                        <label for="note">Ghi chú</label>
                        <textarea id="note" name="note" rows="3" placeholder="Nhập ghi chú..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-save"><i class="fas fa-save"></i> Lưu</button>
                        <a href="/admin/pet-enclosures" class="btn btn-cancel">Hủy</a>
                    </div>
                </form>
            </div>
        </main>
        {% include 'layouts/admin_footer.html' %}
    </main>
    <script src="/static/assets/js/script.js" defer></script>
    <script>
        const customerSelect = document.getElementById('customer_id');
        const petSelect = document.getElementById('pet_id');
        const allPetOptions = Array.from(petSelect.querySelectorAll('option')).slice(1).map((option) => ({
            value: option.value,
            label: option.textContent,
            customerId: option.dataset.customer || "",
        }));

        function renderPetsByCustomer(customerId) {
            petSelect.innerHTML = '<option value="">-- Chọn thú cưng --</option>';
            if (!customerId) {
                petSelect.value = '';
                return;
            }
            allPetOptions
                .filter((pet) => pet.customerId === customerId)
                .forEach((pet) => {
                    const option = document.createElement('option');
                    option.value = pet.value;
                    option.textContent = pet.label;
                    option.dataset.customer = pet.customerId;
                    petSelect.appendChild(option);
                });
            petSelect.value = '';
        }

        customerSelect.addEventListener('change', function () {
            renderPetsByCustomer(this.value);
        });
        renderPetsByCustomer(customerSelect.value);

        const enclosureInput = document.getElementById('enclosure_number');
        enclosureInput.addEventListener('input', function () {
            if (this.value && !/^\d+$/.test(this.value)) {
                this.setCustomValidity('Số chuồng chỉ được nhập số nguyên dương.');
            } else {
                this.setCustomValidity('');
            }
        });
    </script>
</body>
</html>
