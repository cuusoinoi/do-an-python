<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="icon" type="image/png" href="/static/admin_assets/images/logo.png">
    <link rel="stylesheet" href="/static/assets/css/base.css">
    <link rel="stylesheet" href="/static/assets/css/main.css">
    <link rel="stylesheet" href="/static/assets/css/grid.css">
    <link rel="stylesheet" href="/static/assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
    <div class="overlay" id="overlay"></div>
    {% include 'layouts/admin_sidebar.html' %}
    <main class="main">
        {% include 'layouts/admin_header.html' %}
        <main class="content">
            <div class="form-container">
                <h2>Chỉnh sửa liệu trình</h2>
                {% if flash.error %}
                    <div class="alert alert-error">{{ flash.error }}</div>
                {% endif %}
                <form action="{{ site_url('admin/treatment-courses/update/' ~ course.treatment_course_id) }}" method="post">
                    
                    <div class="form-group">
                        <label for="customer_id">Khách hàng <span class="required-field">*</span></label>
                        <select id="customer_id" name="customer_id" required>
                            <option value="">-- Chọn khách hàng --</option>
                            {% for customer in customers %}
                                <option value="{{ customer.customer_id }}" {{ ('selected' if customer.customer_id == course.customer_id else '') }}>{{ customer.customer_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pet_id">Thú cưng <span class="required-field">*</span></label>
                        <select id="pet_id" name="pet_id" required>
                            <option value="">-- Chọn thú cưng --</option>
                            {% for pet in pets %}
                                <option value="{{ pet.pet_id }}" data-customer="{{ pet.customer_id }}" {{ ('selected' if pet.pet_id == course.pet_id else '') }}>{{ pet.pet_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="medical_record_id">Phiếu khám liên quan</label>
                        <select id="medical_record_id" name="medical_record_id">
                            <option value="">-- Không liên kết --</option>
                            {% for record in medicalRecords %}
                                <option value="{{ record.medical_record_id }}" {{ ('selected' if record.medical_record_id == course.medical_record_id else '') }}>
                                    #{{ record.medical_record_id }} - {{ record.medical_record_type }} - {{ date('d/m/Y', strtotime(record.medical_record_visit_date)) }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="start_date">Ngày bắt đầu <span class="required-field">*</span></label>
                        <input type="date" id="start_date" name="start_date" value="{{ course.start_date }}" required>
                    </div>
                    <div class="form-group">
                        <label for="end_date">Ngày kết thúc</label>
                        <input type="date" id="end_date" name="end_date" value="{{ course.end_date }}">
                    </div>
                    <div class="form-group">
                        <label for="status">Trạng thái</label>
                        <select id="status" name="status">
                            <option value="1" {{ ('selected' if course.status == 1 else '') }}>Đang điều trị</option>
                            <option value="0" {{ ('selected' if course.status == 0 else '') }}>Đã kết thúc</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-save"><i class="fas fa-save"></i> Lưu</button>
                        <a href="/admin/treatment-courses" class="btn btn-cancel">Hủy</a>
                    </div>
                </form>
            </div>
        </main>
        {% include 'layouts/admin_footer.html' %}
    </main>
    <script src="/static/assets/js/script.js" defer></script>
</body>
</html>
